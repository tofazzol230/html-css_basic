<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>button</title>
        <link rel="icon" type="image/png" href="icon.png">
    </head>
    <body>
        <button onclick="rahatFunction()" style="color: white; background-color: black; border-radius: 10px;">Click Me!</button>
        
        <p id="greeting">Hello</p>

        <!--java Script er topic-->
        <script>
            function rahatFunction() {
                document.getElementById("greeting").innerHTML = "Yey, you clicked the button!";
            }
        </script>
    </body>
</html>
