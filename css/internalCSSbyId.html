<!--CSS --inline|| internal|| external-->
    <!--internal CSS in html-->


<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>internalCSS</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body {
            background-color: black;
        }
        h1 {
            color: blue;
            text-align: center;
        }
        #firstPara {
            color: red;
            font-size: 18px;
        }
        #secondPara {
            color: yellow;
            font-size: 20px;
        }
        #thirdPara {
            color: lightgreen;
            font-size: 22px;
        }
    </style>
</head>
<body>
    <h1>Welcome to the website</h1>
    <p id="firstPara">This is the first paragraph styled with ID.</p>
    <p id="secondPara">This is the second paragraph styled with ID.</p>
    <p id="thirdPara">This is the third paragraph styled with ID.</p>
</body>
</html>
