        <!--
        CSS Combinators – Full Explanation

        1. Descendant selector (space)
        Syntax: A B
        Meaning: Selects all elements B that are inside A, at any depth.
        Example:
            div p → selects all <p> inside <div>, even nested deeper.

        2. Child selector (>)
        Syntax: A > B
        Meaning: Selects only direct children B of A.
        Example:
            div > p → selects <p> directly inside <div>, but not deeper.

        3. General sibling selector (~)
        Syntax: A ~ B
        Meaning: Selects all siblings B that come after A, sharing the same parent.
        Example:
            h1 ~ p → selects all <p> after <h1> in the same parent.

        4. Adjacent sibling selector (+)
        Syntax: A + B
        Meaning: Selects the immediate next sibling B after A.
        Example:
            h1 + p → selects the first <p> immediately after <h1>.

        Notes:
        - Combinators define relationships between selectors.
        - They allow precise targeting without extra classes or IDs.
        -->
        <div id="container">
            <p>This is a paragraph 1</p>
            <p>This is a paragraph 2</p>
            <div>
                <p>This is a paragraph 3</p>
            </div>
        </div>
        <p>This is a paragraph 4</p>
        <p>This is a paragraph 5</p>
