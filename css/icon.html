<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Icon</title>
        <link rel="icon" type="image/png" href="icon.png">
        <link rel="stylesheet" type="text/css" href="icon.css">
        <script src="https://kit.fontawesome.com/98f78992fa.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="icon">
            <i class="fa-duotone fa-solid fa-house fa-5x"></i>
            <i class="fa-regular fa-circle-user fa-5x"></i>
            <i class="fa-solid fa-volume fa-5x"></i>
            <a href="https://www.facebook.com">
                <i class="fa-brands fa-facebook fa-5x"></i>
            </a>
            <a href="https://www.instagram.com">
                <i class="fa-brands fa-instagram fa-5x"></i>
            </a>
        </div>
    </body>
</html>
